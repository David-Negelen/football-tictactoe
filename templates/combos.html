<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Combos — Football DB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    tbody tr:hover { background-color: rgb(239 246 255); }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800 text-sm">

  <!-- Header -->
  <header class="bg-slate-900 text-white px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-md">
    <div class="flex items-center gap-4">
      <a href="/" class="text-slate-400 hover:text-white text-sm transition-colors">← DB Explorer</a>
      <h1 class="text-lg font-bold tracking-tight">🔗 Club Combos</h1>
    </div>
    <div class="flex items-center gap-3">
      <a href="/game" class="bg-green-700 hover:bg-green-600 text-white text-xs font-bold px-3 py-1.5 rounded-full transition-colors">🎮 Tiki-Taka-Toe</a>
      <span id="pair-count" class="text-slate-400 text-xs"></span>
    </div>
  </header>

  <div class="max-w-5xl mx-auto p-4 space-y-3">

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-wrap gap-4 items-end">
      <div class="flex-1 min-w-[200px]">
        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Club</label>
        <select id="filter-club"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All pairs</option>
        </select>
      </div>
      <div class="flex-1 min-w-[260px]">
        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">
          Max shared players: <span id="max-label" class="text-blue-600 font-bold">1</span>
        </label>
        <input id="max-slider" type="range" min="1" max="50" value="1"
          class="w-full accent-blue-600">
      </div>
      <button id="clear-filters"
        class="px-4 py-2 text-sm text-slate-600 hover:text-slate-900 border border-slate-300 rounded-lg hover:bg-slate-100 transition-colors">
        Reset
      </button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div id="loading" class="p-10 text-center text-slate-400">Loading…</div>
      <div id="table-wrap" class="hidden overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-100 text-slate-600 text-left text-xs uppercase tracking-wide">
              <th class="px-4 py-3 font-semibold w-8 text-center">#</th>
              <th class="px-4 py-3 font-semibold">Club 1</th>
              <th class="px-4 py-3 font-semibold">Club 2</th>
              <th class="px-4 py-3 font-semibold text-center w-20">Players</th>
              <th class="px-4 py-3 font-semibold">Shared players</th>
            </tr>
          </thead>
          <tbody id="combos-tbody"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden p-10 text-center text-slate-400">No pairs match these filters.</div>
    </div>

  </div>

  <!-- Player detail modal (reused from index) -->
  <div id="modal-backdrop"
    class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
    style="backdrop-filter: blur(2px)">
    <div id="modal"
      class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto">
      <div id="modal-content">
        <div class="p-10 text-center text-slate-400">Loading…</div>
      </div>
    </div>
  </div>

<script>
function esc(v) {
  if (v == null) return '';
  const d = document.createElement('div');
  d.textContent = String(v);
  return d.innerHTML;
}

const state = { club: '', maxPlayers: 1, allPairs: [] };

// ── Filters ───────────────────────────────────────────────────────────────────

function applyFilters() {
  const { club, maxPlayers, allPairs } = state;
  return allPairs.filter(p =>
    p.count <= maxPlayers &&
    (!club || p.club1 === club || p.club2 === club)
  );
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const filtered = applyFilters();
  document.getElementById('pair-count').textContent =
    `${filtered.length} pair${filtered.length !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('combos-tbody');
  const tableWrap = document.getElementById('table-wrap');
  const empty = document.getElementById('empty');

  if (!filtered.length) {
    tableWrap.classList.add('hidden');
    empty.classList.remove('hidden');
    return;
  }

  empty.classList.add('hidden');
  tableWrap.classList.remove('hidden');

  const countColors = ['', 'text-red-600 font-bold', 'text-orange-500 font-semibold',
    'text-yellow-600 font-semibold', 'text-slate-600', 'text-slate-500'];

  tbody.innerHTML = filtered.map((pair, idx) => {
    const colorClass = countColors[Math.min(pair.count, countColors.length - 1)];
    const pills = pair.players.map(pl =>
      `<button onclick="showPlayer(${pl.id})"
        class="inline-block bg-slate-100 hover:bg-blue-100 hover:text-blue-700 text-slate-700 rounded-full px-2.5 py-0.5 text-xs transition-colors cursor-pointer">
        ${esc(pl.name)}
      </button>`
    ).join(' ');

    return `<tr class="border-t border-slate-100">
      <td class="px-4 py-2.5 text-center text-slate-400 text-xs">${idx + 1}</td>
      <td class="px-4 py-2.5 font-medium">${esc(pair.club1)}</td>
      <td class="px-4 py-2.5 font-medium">${esc(pair.club2)}</td>
      <td class="px-4 py-2.5 text-center ${colorClass}">${pair.count}</td>
      <td class="px-4 py-2.5"><div class="flex flex-wrap gap-1">${pills}</div></td>
    </tr>`;
  }).join('');
}

// ── Player modal ──────────────────────────────────────────────────────────────

async function showPlayer(id) {
  document.getElementById('modal-content').innerHTML =
    '<div class="p-10 text-center text-slate-400">Loading…</div>';
  document.getElementById('modal-backdrop').classList.remove('hidden');

  const r = await fetch(`/api/players/${id}`);
  const { player: p, transfers, career_stints } = await r.json();

  const badge = (icon, text) => text
    ? `<span class="inline-flex items-center gap-1 bg-slate-100 rounded-full px-2.5 py-0.5 text-xs text-slate-700">${icon} ${esc(text)}</span>`
    : '';

  const stintsHtml = career_stints.length ? `
    <table class="w-full text-sm">
      <thead><tr class="text-left text-slate-400 border-b border-slate-100 text-xs uppercase tracking-wide">
        <th class="pb-2 pr-4 font-semibold">Club</th>
        <th class="pb-2 pr-4 font-semibold">From</th>
        <th class="pb-2 font-semibold">Until</th>
      </tr></thead>
      <tbody>${career_stints.map(s => `
        <tr class="border-b border-slate-50">
          <td class="py-1.5 pr-4 font-medium">${esc(s.club_name)}</td>
          <td class="py-1.5 pr-4 text-slate-500">${esc(s.start_season || s.start_date) || '—'}</td>
          <td class="py-1.5 text-slate-500">${esc(s.end_season || s.end_date) || '<span class="text-blue-500">Present</span>'}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : '<p class="text-slate-400 text-sm italic">No career data</p>';

  const tmUrl = p.source_url?.startsWith('http') ? p.source_url : `https://www.transfermarkt.de${p.source_url}`;

  document.getElementById('modal-content').innerHTML = `
    <div class="p-6 border-b border-slate-200 flex items-start justify-between gap-4">
      <div>
        <h2 class="text-2xl font-bold">${esc(p.name)}</h2>
        <div class="flex flex-wrap gap-2 mt-3">
          ${badge('🏟', p.current_club_name)}
          ${badge('🌍', p.nationality)}
          ${badge('📍', p.position)}
          ${p.age ? badge('🎂', `Age ${p.age}`) : ''}
          ${p.market_value ? `<span class="inline-flex items-center gap-1 bg-emerald-50 rounded-full px-2.5 py-0.5 text-xs text-emerald-700 font-mono font-semibold">💶 ${esc(p.market_value)}</span>` : ''}
        </div>
        ${p.source_url ? `<a href="${esc(tmUrl)}" target="_blank" rel="noopener"
          class="inline-block mt-3 text-xs text-blue-500 hover:underline">View on Transfermarkt ↗</a>` : ''}
      </div>
      <button id="modal-close"
        class="text-slate-300 hover:text-slate-700 text-3xl leading-none flex-shrink-0">×</button>
    </div>
    <div class="p-6">
      <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Career Stints (${career_stints.length})</h3>
      ${stintsHtml}
    </div>`;

  document.getElementById('modal-close').addEventListener('click', closeModal);
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.add('hidden');
}

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadData() {
  const r = await fetch('/api/clubs/combos?max_players=200');
  const d = await r.json();
  state.allPairs = d.pairs;

  // Collect unique club names for dropdown
  const clubSet = new Set();
  d.pairs.forEach(p => { clubSet.add(p.club1); clubSet.add(p.club2); });
  const clubs = [...clubSet].sort();

  const sel = document.getElementById('filter-club');
  sel.innerHTML = '<option value="">All pairs</option>' +
    clubs.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');

  // Set slider max based on real data
  const maxCount = Math.max(...d.pairs.map(p => p.count), 1);
  document.getElementById('max-slider').max = Math.min(maxCount, 100);

  document.getElementById('loading').classList.add('hidden');
  render();
}

// ── Event wiring ──────────────────────────────────────────────────────────────

document.getElementById('filter-club').addEventListener('change', e => {
  state.club = e.target.value; render();
});
document.getElementById('max-slider').addEventListener('input', e => {
  state.maxPlayers = parseInt(e.target.value);
  document.getElementById('max-label').textContent = e.target.value;
  render();
});
document.getElementById('clear-filters').addEventListener('click', () => {
  state.club = ''; state.maxPlayers = 1;
  document.getElementById('filter-club').value = '';
  document.getElementById('max-slider').value = '1';
  document.getElementById('max-label').textContent = '1';
  render();
});
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target.id === 'modal-backdrop') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadData();
</script>
</body>
</html>
