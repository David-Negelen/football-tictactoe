<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football DB Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    th.sortable:hover { background-color: rgb(226 232 240); }
    th.sort-active { color: rgb(37 99 235); background-color: rgb(239 246 255); }
    th.sort-active::after { content: ' ↑'; font-size: 0.7em; }
    th.sort-active.desc::after { content: ' ↓'; }
    tbody tr:hover { background-color: rgb(239 246 255); cursor: pointer; }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800 text-sm">

  <!-- Header -->
  <header class="bg-slate-900 text-white px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-md">
    <h1 class="text-lg font-bold tracking-tight">⚽ Football DB Explorer</h1>
    <span id="total-count" class="text-slate-400 text-xs"></span>
  </header>

  <div class="max-w-[1700px] mx-auto p-4 space-y-3">

    <!-- Filters -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-wrap gap-3 items-end">
      <div class="flex-1 min-w-[180px]">
        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Player name</label>
        <input id="search" type="text" placeholder="Search…"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="flex-1 min-w-[180px]">
        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Club</label>
        <select id="filter-club"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All clubs</option>
        </select>
      </div>
      <div class="flex-1 min-w-[180px]">
        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Position</label>
        <select id="filter-position"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All positions</option>
        </select>
      </div>
      <div class="flex-1 min-w-[160px]">
        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Nationality</label>
        <input id="filter-nationality" type="text" placeholder="e.g. German"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Per page</label>
        <select id="per-page"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </div>
      <button id="clear-filters"
        class="px-4 py-2 text-sm text-slate-600 hover:text-slate-900 border border-slate-300 rounded-lg hover:bg-slate-100 transition-colors">
        Clear filters
      </button>
    </div>

    <!-- Table card -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <div id="loading" class="hidden p-10 text-center text-slate-400">Loading…</div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-100 text-slate-600 text-left text-xs uppercase tracking-wide">
              <th class="sortable px-4 py-3 font-semibold" data-col="name">Name</th>
              <th class="sortable px-4 py-3 font-semibold" data-col="current_club_name">Club</th>
              <th class="px-4 py-3 font-semibold">Nationality</th>
              <th class="sortable px-4 py-3 font-semibold" data-col="position">Position</th>
              <th class="sortable px-4 py-3 font-semibold text-right" data-col="market_value">Value</th>
              <th class="sortable px-4 py-3 font-semibold text-center" data-col="age">Age</th>
              <th class="sortable px-4 py-3 font-semibold" data-col="contract_expires">Contract</th>
              <th class="sortable px-4 py-3 font-semibold text-center" data-col="clubs_count">Clubs</th>
              <th class="sortable px-4 py-3 font-semibold text-center" data-col="transfer_count">Trans.</th>
              <th class="sortable px-4 py-3 font-semibold" data-col="career_start">Career</th>
            </tr>
          </thead>
          <tbody id="player-tbody">
            <tr><td colspan="10" class="px-4 py-8 text-center text-slate-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination"
        class="flex items-center justify-between px-4 py-3 border-t border-slate-200 text-xs text-slate-500">
      </div>
    </div>

  </div>

  <!-- Player detail modal -->
  <div id="modal-backdrop"
    class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
    style="backdrop-filter: blur(2px)">
    <div id="modal"
      class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">
      <div id="modal-content">
        <div class="p-10 text-center text-slate-400">Loading…</div>
      </div>
    </div>
  </div>

<script>
// source_url is already a full URL from the DB
function tmLink(sourceUrl) {
  if (!sourceUrl) return null;
  // Handle both full URLs and relative paths
  return sourceUrl.startsWith('http') ? sourceUrl : `https://www.transfermarkt.de${sourceUrl}`;
}

const state = {
  search: '', club: '', nationality: '', position: '',
  sort: 'name', order: 'asc',
  page: 1, perPage: 50,
  players: [], total: 0, totalPages: 0,
};

// ── Utils ────────────────────────────────────────────────────────────────────

function esc(v) {
  if (v == null) return '';
  const d = document.createElement('div');
  d.textContent = String(v);
  return d.innerHTML;
}

function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ── API ──────────────────────────────────────────────────────────────────────

async function fetchFilters() {
  const r = await fetch('/api/filters');
  const d = await r.json();

  const clubSel = document.getElementById('filter-club');
  clubSel.innerHTML = '<option value="">All clubs</option>' +
    d.clubs.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');

  const posSel = document.getElementById('filter-position');
  posSel.innerHTML = '<option value="">All positions</option>' +
    d.positions.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
}

async function fetchPlayers() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('player-tbody').innerHTML = '';

  const p = new URLSearchParams({
    search: state.search, club: state.club,
    nationality: state.nationality, position: state.position,
    sort: state.sort, order: state.order,
    page: state.page, per_page: state.perPage,
  });

  const r = await fetch(`/api/players?${p}`);
  const d = await r.json();

  state.players = d.data;
  state.total = d.total;
  state.totalPages = d.pages;

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('total-count').textContent =
    `${d.total.toLocaleString()} players`;

  renderTable();
  renderPagination();
}

async function showPlayerDetail(id) {
  document.getElementById('modal-content').innerHTML =
    '<div class="p-10 text-center text-slate-400">Loading…</div>';
  document.getElementById('modal-backdrop').classList.remove('hidden');

  const r = await fetch(`/api/players/${id}`);
  renderModal(await r.json());
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderTable() {
  // Update sort indicators
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.remove('sort-active', 'desc');
    if (th.dataset.col === state.sort) {
      th.classList.add('sort-active');
      if (state.order === 'desc') th.classList.add('desc');
    }
  });

  const tbody = document.getElementById('player-tbody');

  if (!state.players.length) {
    tbody.innerHTML =
      '<tr><td colspan="10" class="px-4 py-10 text-center text-slate-400">No players found</td></tr>';
    return;
  }

  tbody.innerHTML = state.players.map(p => {
    const career = p.career_start
      ? `${p.career_start}–${p.career_end ?? '?'}`
      : '—';
    const tmUrl = tmLink(p.source_url);
    const nameCell = tmUrl
      ? `<a href="${tmUrl}" target="_blank" rel="noopener"
            class="text-blue-600 hover:underline font-medium" onclick="event.stopPropagation()"
         >${esc(p.name)}</a>`
      : `<span class="font-medium">${esc(p.name)}</span>`;

    return `<tr class="border-t border-slate-100 transition-colors" data-id="${p.id}">
      <td class="px-4 py-2.5">${nameCell}</td>
      <td class="px-4 py-2.5 text-slate-600 max-w-[160px] truncate" title="${esc(p.current_club_name)}">${esc(p.current_club_name) || '—'}</td>
      <td class="px-4 py-2.5 text-slate-600">${esc(p.nationality) || '—'}</td>
      <td class="px-4 py-2.5 text-slate-600 max-w-[180px] truncate" title="${esc(p.position)}">${esc(p.position) || '—'}</td>
      <td class="px-4 py-2.5 text-right font-mono text-emerald-700 font-medium">${esc(p.market_value) || '—'}</td>
      <td class="px-4 py-2.5 text-center">${p.age ?? '—'}</td>
      <td class="px-4 py-2.5 text-slate-600">${esc(p.contract_expires) || '—'}</td>
      <td class="px-4 py-2.5 text-center tabular-nums">${p.clubs_count ?? 0}</td>
      <td class="px-4 py-2.5 text-center tabular-nums">${p.transfer_count ?? 0}</td>
      <td class="px-4 py-2.5 text-slate-500 tabular-nums">${esc(career)}</td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('tr[data-id]').forEach(tr => {
    tr.addEventListener('click', () => showPlayerDetail(parseInt(tr.dataset.id)));
  });
}

function renderPagination() {
  const { page, totalPages, total, perPage } = state;
  const start = Math.min((page - 1) * perPage + 1, total);
  const end = Math.min(page * perPage, total);

  function btn(n, label) {
    const active = n === page
      ? 'bg-blue-600 text-white border-blue-600'
      : 'border-slate-200 hover:bg-slate-50 text-slate-700';
    return `<button onclick="goPage(${n})"
      class="px-2.5 py-1 rounded-md border text-xs font-medium ${active}">${label ?? n}</button>`;
  }

  let pages = '';
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages += btn(i);
  } else {
    pages += btn(1);
    if (page > 3) pages += '<span class="px-1 text-slate-400">…</span>';
    for (let i = Math.max(2, page - 1); i <= Math.min(totalPages - 1, page + 1); i++) {
      pages += btn(i);
    }
    if (page < totalPages - 2) pages += '<span class="px-1 text-slate-400">…</span>';
    pages += btn(totalPages);
  }

  document.getElementById('pagination').innerHTML = `
    <span>${start}–${end} of <strong>${total.toLocaleString()}</strong></span>
    <div class="flex items-center gap-1">
      <button onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}
        class="px-2.5 py-1 rounded-md border border-slate-200 text-xs disabled:opacity-30 hover:bg-slate-50">←</button>
      ${pages}
      <button onclick="goPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}
        class="px-2.5 py-1 rounded-md border border-slate-200 text-xs disabled:opacity-30 hover:bg-slate-50">→</button>
    </div>
  `;
}

function renderModal({ player: p, transfers, career_stints }) {
  const tmUrl = tmLink(p.source_url);

  const badge = (icon, text) => text
    ? `<span class="inline-flex items-center gap-1 bg-slate-100 rounded-full px-2.5 py-0.5 text-xs text-slate-700">
        ${icon} ${esc(text)}</span>`
    : '';

  const stintsHtml = career_stints.length ? `
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-slate-400 border-b border-slate-100 text-xs uppercase tracking-wide">
          <th class="pb-2 pr-4 font-semibold">Club</th>
          <th class="pb-2 pr-4 font-semibold">From</th>
          <th class="pb-2 font-semibold">Until</th>
        </tr>
      </thead>
      <tbody>
        ${career_stints.map(s => `
          <tr class="border-b border-slate-50">
            <td class="py-1.5 pr-4 font-medium">${esc(s.club_name)}</td>
            <td class="py-1.5 pr-4 text-slate-500">${esc(s.start_season || s.start_date) || '—'}</td>
            <td class="py-1.5 text-slate-500">${esc(s.end_season || s.end_date) || '<span class="text-blue-500">Present</span>'}</td>
          </tr>`).join('')}
      </tbody>
    </table>` : '<p class="text-slate-400 text-sm italic">No career data</p>';

  const transfersHtml = transfers.length ? `
    <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="text-left text-slate-400 border-b border-slate-100 text-xs uppercase tracking-wide">
          <th class="pb-2 pr-4 font-semibold">Season</th>
          <th class="pb-2 pr-4 font-semibold">From</th>
          <th class="pb-2 pr-4 font-semibold">To</th>
          <th class="pb-2 pr-4 font-semibold text-right">Fee</th>
          <th class="pb-2 font-semibold text-right">MV</th>
        </tr>
      </thead>
      <tbody>
        ${transfers.map(t => `
          <tr class="border-b border-slate-50">
            <td class="py-1.5 pr-4 text-slate-500">${esc(t.season) || '—'}</td>
            <td class="py-1.5 pr-4">${esc(t.from_club) || '—'}</td>
            <td class="py-1.5 pr-4">${esc(t.to_club) || '—'}</td>
            <td class="py-1.5 pr-4 text-right font-mono text-emerald-700">${esc(t.fee) || '—'}</td>
            <td class="py-1.5 text-right font-mono text-slate-500">${esc(t.market_value) || '—'}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    </div>` : '<p class="text-slate-400 text-sm italic">No transfer data</p>';

  document.getElementById('modal-content').innerHTML = `
    <div class="p-6 border-b border-slate-200 flex items-start justify-between gap-4">
      <div>
        <h2 class="text-2xl font-bold">${esc(p.name)}</h2>
        <div class="flex flex-wrap gap-2 mt-3">
          ${badge('🏟', p.current_club_name)}
          ${badge('🌍', p.nationality)}
          ${badge('📍', p.position)}
          ${p.age ? badge('🎂', `Age ${p.age}`) : ''}
          ${p.market_value ? `<span class="inline-flex items-center gap-1 bg-emerald-50 rounded-full px-2.5 py-0.5 text-xs text-emerald-700 font-mono font-semibold">💶 ${esc(p.market_value)}</span>` : ''}
          ${p.contract_expires ? badge('📅', `Until ${p.contract_expires}`) : ''}
        </div>
        ${tmUrl ? `<a href="${tmUrl}" target="_blank" rel="noopener"
          class="inline-block mt-3 text-xs text-blue-500 hover:underline">View on Transfermarkt ↗</a>` : ''}
      </div>
      <button id="modal-close"
        class="text-slate-300 hover:text-slate-700 text-3xl leading-none flex-shrink-0 transition-colors">×</button>
    </div>
    <div class="p-6 grid md:grid-cols-2 gap-6">
      <div>
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">
          Career Stints (${career_stints.length})
        </h3>
        ${stintsHtml}
      </div>
      <div>
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">
          Transfers (${transfers.length})
        </h3>
        ${transfersHtml}
      </div>
    </div>
  `;

  document.getElementById('modal-close').addEventListener('click', closeModal);
}

// ── Actions ──────────────────────────────────────────────────────────────────

function goPage(n) {
  if (n < 1 || n > state.totalPages) return;
  state.page = n;
  fetchPlayers();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.add('hidden');
}

function resetAndFetch() { state.page = 1; fetchPlayers(); }

// ── Event wiring ─────────────────────────────────────────────────────────────

const debouncedFetch = debounce(resetAndFetch, 300);

document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value; debouncedFetch();
});
document.getElementById('filter-club').addEventListener('change', e => {
  state.club = e.target.value; resetAndFetch();
});
document.getElementById('filter-position').addEventListener('change', e => {
  state.position = e.target.value; resetAndFetch();
});
document.getElementById('filter-nationality').addEventListener('input', e => {
  state.nationality = e.target.value; debouncedFetch();
});
document.getElementById('per-page').addEventListener('change', e => {
  state.perPage = parseInt(e.target.value); state.page = 1; fetchPlayers();
});
document.getElementById('clear-filters').addEventListener('click', () => {
  state.search = ''; state.club = ''; state.nationality = ''; state.position = '';
  state.sort = 'name'; state.order = 'asc'; state.page = 1;
  document.getElementById('search').value = '';
  document.getElementById('filter-club').value = '';
  document.getElementById('filter-nationality').value = '';
  document.getElementById('filter-position').value = '';
  fetchPlayers();
});

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (state.sort === col) {
      state.order = state.order === 'asc' ? 'desc' : 'asc';
    } else {
      state.sort = col;
      // Default desc for numeric/value columns
      state.order = ['market_value', 'clubs_count', 'transfer_count', 'age'].includes(col)
        ? 'desc' : 'asc';
    }
    state.page = 1;
    fetchPlayers();
  });
});

document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target.id === 'modal-backdrop') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ─────────────────────────────────────────────────────────────────────
fetchFilters();
fetchPlayers();
</script>
</body>
</html>
